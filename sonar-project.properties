# Keep Sonar quality-gate signal focused on production code.
# Test fixtures, planning docs, generated artifacts, and maintenance scripts create
# noisy duplication/security churn that should not block the main gate.
sonar.test.inclusions=**/__tests__/**,**/*.test.*,**/*.spec.*,tests/**
sonar.cpd.exclusions=**/__tests__/**,**/*.test.*,**/*.spec.*,tests/**,dist/**,docs/dist/**,docs/node_modules/**,.plans/**,docs/research/**,scripts/**
sonar.exclusions=dist/**,docs/dist/**,docs/node_modules/**,node_modules/**,packages/**/dist/**,.plans/**,docs/research/**,scripts/**
